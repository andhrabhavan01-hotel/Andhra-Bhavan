<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andhra Bhavan | Gallery</title>

<link rel="stylesheet" href="style.css">

<style>

.gallery-page{
padding:120px 8% 60px;
background:#111;
min-height:100vh;
}

.gallery-page h1{
text-align:center;
color:#d4af37;
margin-bottom:15px;
font-size:45px;
}

.gallery-page p{
text-align:center;
color:#ccc;
margin-bottom:40px;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.gallery-card{
background:#1b1b1b;
border-radius:15px;
overflow:hidden;
transition:.4s;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.gallery-card:hover{
transform:translateY(-10px);
box-shadow:0 10px 25px rgba(212,175,55,.35);
}

.gallery-card img{
width:100%;
height:260px;
object-fit:cover;
display:block;
}

.gallery-card h3{
text-align:center;
padding:18px;
color:#d4af37;
}

.back-home{
text-align:center;
margin-top:50px;
}

.back-home a{
background:#d4af37;
padding:15px 35px;
color:#111;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="images/logo.png" alt="Logo">
</div>

<nav>

<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="gallery.html">Gallery</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>

</nav>

</header>

<section class="gallery-page">

<h1>Restaurant Gallery</h1>

<p>Take a look inside Andhra Bhavan.</p>

<div class="gallery-grid">

<div class="gallery-card">
<img src="images/hotel1.jpg">
<h3>Restaurant Front View</h3>
</div>

<div class="gallery-card">
<img src="images/hotel2.jpg">
<h3>Dining Area</h3>
</div>

<div class="gallery-card">
<img src="images/meals.jpg">
<h3>Special Andhra Meals</h3>
</div>

<div class="gallery-card">
<img src="images/hotel3.jpg">
<h3>Family Dining</h3>
</div>

<div class="gallery-card">
<img src="images/hotel4.jpg">
<h3>Our Restaurant</h3>
</div>

<div class="gallery-card">
<img src="images/menu.jpg">
<h3>Complete Menu</h3>
</div>

</div>

<div class="back-home">
<a href="index.html">⬅ Back to Home</a>
</div>

</section>

<script src="script.js"></script>

</body>
</html>
